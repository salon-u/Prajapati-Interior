"},{step:6,title:"Execution & Installation",description:"Our skilled craftsmen bring the design to life with meticulous attention to quality and detail.",icon:"Hammer"},{step:7,title:"Final Handover",description:"A thorough quality inspection followed by final styling and handover of your beautifully designed space.",icon:"CheckCircle"}],Px=[{question:"How much does interior design cost?",answer:"Interior design costs vary based on the scope, area, materials, and complexity of the project. Our residential projects typically start from ₹8,00,000 for a 2BHK apartment. We provide detailed quotations after understanding your requirements during the initial consultation, which is complimentary."},{question:"How long does a typical interior project take?",answer:"A standard residential interior project (2-3 BHK) takes 10-16 weeks from design approval to handover. This includes design development (2-3 weeks), material procurement (2-4 weeks), and execution (6-10 weeks). Larger or more complex projects may take longer."},{question:"Do you provide 3D designs before starting?",answer:"Absolutely! We provide photorealistic 3D renders of every room so you can visualize exactly how your space will look. This helps in making informed decisions about colors, materials, and layouts before any physical work begins."},{question:"Can I customize the design to my preferences?",answer:"Yes, every project is fully customized. We don't use templates or pre-made designs. Our process starts with understanding your lifestyle, preferences, and aspirations, and every design element is tailored specifically for you."},{question:"What is included in your turnkey solutions?",answer:"Our turnkey solution covers everything: design consultation, space planning, 3D visualization, all civil work, electrical and plumbing, false ceiling, modular furniture, kitchen, wardrobes, painting, lighting, and final styling. You just hand us the keys and we deliver a move-in ready space."},{question:"Do you offer
